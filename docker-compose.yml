version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_key_123}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@localhost:5432/mock}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
